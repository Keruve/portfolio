<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#09090B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners for iOS -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  
  <!-- 3D Cube (left side - orange gradient) -->
  <g transform="translate(35, 56) scale(1.5)">
    <!-- Top face -->
    <path d="M 10 0 L 20 5 L 10 10 L 0 5 Z" fill="url(#grad1)" opacity="0.95"/>
    <!-- Left face -->
    <path d="M 0 5 L 0 18 L 10 23 L 10 10 Z" fill="url(#grad1)" opacity="0.7"/>
    <!-- Right face -->
    <path d="M 10 10 L 10 23 L 20 18 L 20 5 Z" fill="url(#grad1)" opacity="0.85"/>
    <!-- Highlight on top edge -->
    <path d="M 10 0 L 20 5 L 19 6 L 9 1 Z" fill="#FFFFFF" opacity="0.2"/>
  </g>
  
  <!-- Code Brackets (right side - blue gradient) -->
  <g transform="translate(100, 56) scale(1.5)">
    <!-- Left bracket < -->
    <path d="M 6 2 L 2 12 L 6 22" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket > -->
    <path d="M 10 2 L 14 12 L 10 22" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot in center -->
    <circle cx="8" cy="12" r="2" fill="url(#grad2)"/>
    <!-- Inner glow -->
    <circle cx="8" cy="12" r="2" fill="#3B82F6" opacity="0.3"/>
  </g>
  
  <!-- Accent elements -->
  <circle cx="90" cy="145" r="3" fill="#FB923C" opacity="0.7"/>
  <circle cx="80" cy="150" r="2" fill="#3B82F6" opacity="0.7"/>
  <circle cx="100" cy="150" r="2" fill="#3B82F6" opacity="0.7"/>
  
  <!-- Subtle grid pattern overlay -->
  <g opacity="0.03">
    <line x1="0" y1="60" x2="180" y2="60" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="180" y2="90" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="180" y2="120" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="180" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="90" y1="0" x2="90" y2="180" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
</svg>

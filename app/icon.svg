<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#18181B"/>
  
  <!-- 3D Cube (left side - orange gradient) -->
  <g transform="translate(12, 20)">
    <!-- Top face -->
    <path d="M 10 0 L 20 5 L 10 10 L 0 5 Z" fill="url(#grad1)" opacity="0.9"/>
    <!-- Left face -->
    <path d="M 0 5 L 0 18 L 10 23 L 10 10 Z" fill="url(#grad1)" opacity="0.6"/>
    <!-- Right face -->
    <path d="M 10 10 L 10 23 L 20 18 L 20 5 Z" fill="url(#grad1)" opacity="0.75"/>
  </g>
  
  <!-- Code Brackets (right side - blue gradient) -->
  <g transform="translate(36, 20)">
    <!-- Left bracket < -->
    <path d="M 6 2 L 2 12 L 6 22" stroke="url(#grad2)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket > -->
    <path d="M 10 2 L 14 12 L 10 22" stroke="url(#grad2)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot in center -->
    <circle cx="8" cy="12" r="1.5" fill="url(#grad2)"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="32" cy="54" r="1.5" fill="#FB923C" opacity="0.6"/>
  <circle cx="28" cy="56" r="1" fill="#3B82F6" opacity="0.6"/>
  <circle cx="36" cy="56" r="1" fill="#3B82F6" opacity="0.6"/>
</svg>
